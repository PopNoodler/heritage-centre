<title>Heritage Centre — Isle of Barra Interactive Map</title>
<style>
/* ============================================================
   Heritage Centre — Interactive Map of the Isle of Barra
   Celtic / antique-chart styling for a Western Isles island.
   Top-down map of Barra & Vatersay with real points of interest.
   Self-contained, offline-first kiosk app.
   ============================================================ */
:root{
  --sea1:#2c6470; --sea2:#0b232b;
  --land1:#88a564; --land2:#566f3f; --moor:#6f8f55;
  --heather:#7d5e94; --peat:#6e5536; --moss:#4f6b35;
  --sand:#dccba0; --beach:#e6dcc0;
  --parch:#f0e6cd; --parch2:#e2cfa3; --parch-edge:#d8c79c;
  --ink:#2b2317; --ink-soft:#5b513c;
  --bronze:#a9762a; --bronze-lt:#e0bd6f; --bronze-dk:#7c531a;
  --celtic-red:#8c2f2a; --celtic-green:#3f6b39;
  --shadow:rgba(20,12,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;width:100%;overflow:hidden;
  font-family:Georgia,"Iowan Old Style","Palatino Linotype",Palatino,"Times New Roman",serif;
  color:var(--ink);background:var(--sea2);
  user-select:none;-webkit-user-select:none;touch-action:none;}
button{font-family:inherit;cursor:pointer;border:none;}

/* ---------- title cartouche ---------- */
.header{position:absolute;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:flex-start;justify-content:center;padding-top:14px;pointer-events:none;}
.cartouche{display:flex;align-items:center;gap:18px;
  background:linear-gradient(180deg,var(--parch),var(--parch2));
  border:3px solid var(--bronze);outline:2px solid var(--parch);outline-offset:-7px;
  border-radius:14px/40px;padding:8px 34px;box-shadow:0 6px 18px var(--shadow);}
.cartouche .knot{width:40px;height:40px;color:var(--bronze);flex:none;}
.cartouche .cflag{width:52px;height:32px;flex:none;border:1.5px solid var(--bronze);
  border-radius:3px;box-shadow:0 2px 5px var(--shadow);}
.cartouche h1{margin:0;font-size:30px;font-weight:700;letter-spacing:3px;
  font-variant:small-caps;color:var(--ink);text-align:center;line-height:1.05;}
.cartouche .gd{display:block;font-size:17px;font-style:italic;font-variant:normal;
  letter-spacing:1px;color:var(--celtic-red);font-weight:400;}

/* ---------- map viewport ---------- */
#viewport{position:absolute;inset:0;overflow:hidden;
  background:radial-gradient(135% 135% at 50% 42%, #34788a, var(--sea2));cursor:grab;}
#viewport.dragging{cursor:grabbing;}
#world{position:absolute;top:0;left:0;width:1600px;height:1000px;transform-origin:0 0;will-change:transform;}
#world svg{position:absolute;inset:0;width:1600px;height:1000px;}

/* ---------- POI markers: carved-stone medallions ---------- */
.poi{position:absolute;transform:translate(-50%,-100%);z-index:6;
  display:flex;flex-direction:column;align-items:center;background:none;}
.poi .pin{position:relative;width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, #fbf3dc, var(--parch2));
  border:3px solid var(--bronze);
  box-shadow:0 0 0 3px var(--parch), 0 0 0 5px var(--bronze-dk), 0 6px 12px var(--shadow);
  display:flex;align-items:center;justify-content:center;}
.poi .pin span{font-size:27px;line-height:1;}
.poi .pin::after{content:"";position:absolute;bottom:-12px;left:50%;
  width:14px;height:14px;background:var(--bronze);transform:translateX(-50%) rotate(45deg);
  box-shadow:0 0 0 3px var(--parch);border-radius:0 0 3px 0;}
.poi .lbl{margin-top:14px;background:linear-gradient(180deg,var(--parch),var(--parch2));
  color:var(--ink);font-weight:700;font-size:16px;letter-spacing:.4px;
  padding:5px 13px;border-radius:6px;border:1.5px solid var(--bronze);
  box-shadow:0 3px 8px var(--shadow);white-space:nowrap;}
.poi:active .pin{transform:scale(.92);}
.poi.bounce .pin{animation:pinbounce 2.4s ease-in-out infinite;}
@keyframes pinbounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.poi.here .pin{border-color:var(--celtic-green);box-shadow:0 0 0 3px var(--parch),0 0 0 5px #2c4a26,0 6px 12px var(--shadow);}
.poi.here .pin::after{background:var(--celtic-green);}
.poi.here .lbl{background:var(--celtic-green);color:#fff;border-color:#2c4a26;}

/* ---------- zoom controls ---------- */
.controls{position:absolute;right:calc(24px + env(safe-area-inset-right));
  bottom:calc(24px + env(safe-area-inset-bottom));z-index:35;display:flex;flex-direction:column;gap:14px;}
.ctrl{width:74px;height:74px;border-radius:16px;
  background:linear-gradient(180deg,var(--parch),var(--parch2));color:var(--bronze-dk);
  font-size:38px;font-weight:800;display:flex;align-items:center;justify-content:center;
  border:3px solid var(--bronze);box-shadow:0 5px 12px var(--shadow);}
.ctrl:active{transform:scale(.93);}
.ctrl.reset{font-size:28px;}

.hint{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(26px + env(safe-area-inset-bottom));z-index:35;
  background:linear-gradient(180deg,var(--parch),var(--parch2));
  padding:11px 22px;border-radius:30px;font-size:17px;font-weight:700;color:var(--ink);
  border:2px solid var(--bronze);box-shadow:0 4px 10px var(--shadow);
  display:flex;align-items:center;gap:9px;animation:fade 6s ease forwards;animation-delay:9s;}
@keyframes fade{to{opacity:0;visibility:hidden;}}

/* ---------- info panel (illuminated parchment) ---------- */
.panel{position:absolute;top:0;right:0;bottom:0;width:min(46vw,520px);z-index:40;
  background:linear-gradient(180deg,var(--parch),var(--parch2));
  border-left:5px solid var(--bronze);box-shadow:-12px 0 44px rgba(0,0,0,.45);
  transform:translateX(105%);transition:transform .32s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;}
.panel.open{transform:translateX(0);}
.panel .p-img{height:36%;min-height:190px;width:100%;background:#d8c79c;border-bottom:4px solid var(--bronze);}
.panel .p-img svg,.panel .p-img img{width:100%;height:100%;display:block;object-fit:cover;}
.panel .p-body{flex:1;overflow-y:auto;padding:14px 30px 26px;}
.panel .p-rule{display:block;width:100%;height:22px;color:var(--bronze);margin:2px 0 10px;}
.panel .p-body h2{margin:0 0 2px;font-size:32px;font-variant:small-caps;letter-spacing:1px;color:var(--ink);}
.panel .p-body .p-gaelic{font-size:19px;font-style:italic;color:var(--celtic-red);margin:0 0 14px;}
.panel .p-body .p-kicker{font-size:14px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--bronze-dk);margin-bottom:6px;}
.panel .p-body p{font-size:20px;line-height:1.55;color:var(--ink-soft);margin:0 0 16px;}
.panel .p-close{position:absolute;top:16px;right:16px;width:56px;height:56px;border-radius:50%;
  background:var(--parch);border:2.5px solid var(--bronze);font-size:26px;color:var(--bronze-dk);
  box-shadow:0 3px 8px var(--shadow);z-index:2;}
.panel .p-close:active{transform:scale(.92);}
.panel .p-fact{background:#eef2e3;border:1.5px solid var(--celtic-green);border-left:6px solid var(--celtic-green);
  padding:14px 18px;border-radius:8px;font-size:19px;color:var(--ink-soft);}
.panel .p-fact b{color:var(--celtic-green);}

/* ---------- woven Celtic-knot border frame ---------- */
#frame{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:25;}
</style>
</head>

      <circle r="18" fill="#efe4cb" stroke="#7c531a" stroke-width="2.5"/><use href="#triq" x="-13" y="-13" width="26" height="26"/></g></svg>
    <svg x="100%" y="100%" overflow="visible"><g transform="translate(-13,-13)">
      <circle r="18" fill="#efe4cb" stroke="#7c531a" stroke-width="2.5"/><use href="#triq" x="-13" y="-13" width="26" height="26"/></g></svg>
  </g>
</svg>

<script>
/* ============================================================
   POINTS OF INTEREST — real places on Barra & Vatersay.
   x / y are positions on the 1600 x 1000 map (north is up).
   To use a real photo set  photo:"assets/kisimul.jpg".
   ============================================================ */
const POIS = [
  { x:760, y:738, icon:"🏰", title:"Kisimul Castle", gaelic:"Caisteal Chiosmuil",
    desc:"A medieval stronghold rising straight out of the sea in Castlebay, the ancestral seat of Clan MacNeil. A short boat trip takes visitors out to the restored keep and great hall.",
    fact:"The MacNeil chief leases the castle to the nation for £1 and a bottle of whisky a year.", motif:"🏰" },

  { x:792, y:702, icon:"⚓", title:"Castlebay", gaelic:"Bàgh a' Chaisteil",
    desc:"Barra's main village and ferry port, curving around the bay beneath the Church of Our Lady, Star of the Sea. The boat from Oban arrives here.",
    fact:"Castlebay was once a busy herring port, with hundreds of boats filling the bay.", motif:"⚓" },

  { x:648, y:678, icon:"🏛️", title:"Dualchas — Barra Heritage Centre", gaelic:"Dualchas", here:true,
    desc:"You are here! The island's heritage and cultural centre in Castlebay tells Barra's story — and is home to this interactive map.",
    fact:"The centre runs regular events and activities, especially for children.", motif:"🏛️" },

  { x:840, y:560, icon:"⛰️", title:"Heaval", gaelic:"Sheabhal",
    desc:"Barra's highest hill at 383 m (1,257 ft). A white marble statue of Our Lady of the Sea stands on its slopes, watching over the island and the sea.",
    fact:"From the summit you can see south to Vatersay, Mingulay and Berneray.", motif:"⛰️" },

  { x:930, y:300, icon:"✈️", title:"Barra Airport — Tràigh Mhòr", gaelic:"An Tràigh Mhòr",
    desc:"The only airport in the world with scheduled flights landing on a beach — the cockle-shell sands of Tràigh Mhòr. Between flights it is a magnificent public beach.",
    fact:"Flight times change with the tide, because high water covers the runway!", motif:"✈️" },

  { x:818, y:172, icon:"⛪", title:"Cille Bharra", gaelic:"Cille Bharra",
    desc:"An ancient church and burial ground at Eoligarry, named after St Barr. Its medieval chapel may have origins as early as the 7th century.",
    fact:"Sir Compton Mackenzie, author of Whisky Galore, is buried here.", motif:"⛪" },

  { x:1052, y:392, icon:"⛴️", title:"Ardmhor Ferry", gaelic:"Àird Mhòr",
    desc:"The small north-eastern ferry terminal, where the ferry crosses the Sound of Barra to Eriskay and on to South Uist.",
    fact:"It is one of two ferry routes that connect Barra to the wider world.", motif:"⛴️" },

  { x:1058, y:520, icon:"🐟", title:"Northbay", gaelic:"Bàgh a Tuath",
    desc:"A village set around a sheltered east-coast bay. A statue of St Finbarr stands on a small islet, looking out over the water.",
    fact:"The waters here have long supported fishing and shellfish for island families.", motif:"🐟" },

  { x:684, y:476, icon:"🪨", title:"Dùn Bharpa", gaelic:"Dùn Bharpa",
    desc:"A large Neolithic chambered burial cairn on the moor near Borve, ringed by tall standing stones — one of Barra's most impressive ancient monuments.",
    fact:"It is more than 5,000 years old, older than the Egyptian pyramids.", motif:"🪨" },

  { x:456, y:512, icon:"🏖️", title:"Halaman Bay & West Beaches", gaelic:"Tràigh Tangasdal",
    desc:"A sweeping arc of white shell-sand on the Atlantic coast near Tangasdale, backed by flower-rich machair grassland. Sunsets here are spectacular.",
    fact:"Barra's pale sand is made from crushed sea shells, not rock.", motif:"🏖️" },

  { x:648, y:892, icon:"🏝️", title:"Isle of Vatersay", gaelic:"Bhatarsaigh",
    desc:"Barra's southern neighbour, reached by a causeway built in 1991. It is famous for its twin white-sand beaches lying back to back across a narrow isthmus.",
    fact:"A memorial recalls the 1853 wreck of the emigrant ship Annie Jane off the island.", motif:"🏝️" }
];

/* ---- antique illuminated plate for the info panel (until real photos are added) ---- */
function plate(p){
  return `<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ead2"/><stop offset="1" stop-color="#dcc79a"/></linearGradient></defs>
    <rect width="520" height="300" fill="url(#pg)"/>
    <circle cx="260" cy="150" r="92" fill="none" stroke="#a9762a" stroke-width="2" opacity="0.5"/>
    <circle cx="260" cy="150" r="104" fill="none" stroke="#a9762a" stroke-width="1" stroke-dasharray="2 7" opacity="0.6"/>
    <g fill="none" stroke="#a9762a" stroke-width="2.4" opacity="0.75">
      <circle cx="36" cy="36" r="9"/><circle cx="484" cy="36" r="9"/>
      <circle cx="36" cy="264" r="9"/><circle cx="484" cy="264" r="9"/>
    </g>
    <rect x="14" y="14" width="492" height="272" fill="none" stroke="#a9762a" stroke-width="3" rx="6"/>
    <rect x="22" y="22" width="476" height="256" fill="none" stroke="#a9762a" stroke-width="1" rx="4"/>
    <text x="260" y="170" font-size="120" text-anchor="middle" dominant-baseline="middle">${p.motif||p.icon}</text>
  </svg>`;
}

/* ============================================================
   MAP ENGINE — pan, zoom (buttons / wheel / pinch), POIs
   ============================================================ */
const world = document.getElementById("world");
const viewport = document.getElementById("viewport");
const MAP_W = 1600, MAP_H = 1000;
let scale = 1, tx = 0, ty = 0;
const MIN = 0.5, MAX = 3.5;

function apply(){ world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }

function clamp(){
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const w = MAP_W*scale, h = MAP_H*scale;
  if (w <= vw) tx = (vw - w)/2; else tx = Math.min(0, Math.max(vw - w, tx));
  if (h <= vh) ty = (vh - h)/2; else ty = Math.min(0, Math.max(vh - h, ty));
}

function fit(){
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  scale = Math.min(vw/MAP_W, vh/MAP_H) * 0.98;
  scale = Math.max(MIN, Math.min(MAX, scale));
  tx = (vw - MAP_W*scale)/2;
  ty = (vh - MAP_H*scale)/2;
  apply();
}

function zoomAt(cx, cy, factor){
  const ns = Math.max(MIN, Math.min(MAX, scale*factor));
  if (ns === scale) return;
  const wx = (cx - tx)/scale, wy = (cy - ty)/scale;
  scale = ns;
  tx = cx - wx*scale; ty = cy - wy*scale;
  clamp(); apply();
}

document.getElementById("zoomIn").onclick = ()=>{ zoomAt(viewport.clientWidth/2, viewport.clientHeight/2, 1.3); resetIdle(); };
document.getElementById("zoomOut").onclick = ()=>{ zoomAt(viewport.clientWidth/2, viewport.clientHeight/2, 1/1.3); resetIdle(); };
document.getElementById("reset").onclick = ()=>{ closePanel(); fit(); resetIdle(); };

/* ---- drag to pan + pinch to zoom (pointer events) ---- */
const pointers = new Map();
let last = null, pinchDist = 0, moved = false;
viewport.addEventListener("pointerdown", e=>{
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  last = {x:e.clientX, y:e.clientY}; moved = false;
  viewport.classList.add("dragging");
  resetIdle();
});
viewport.addEventListener("pointermove", e=>{
  if(!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pointers.size >= 2){
    const pts = [...pointers.values()];
    const d = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    const mx = (pts[0].x+pts[1].x)/2, my=(pts[0].y+pts[1].y)/2;
    if(pinchDist){ zoomAt(mx, my, d/pinchDist); }
    pinchDist = d; moved = true;
    return;
  }
  if(last){
    const dx = e.clientX-last.x, dy = e.clientY-last.y;
    if(Math.abs(dx)+Math.abs(dy) > 10) moved = true; // tolerate finger jitter on a tap
    tx += dx; ty += dy; last = {x:e.clientX, y:e.clientY};
    clamp(); apply();
  }
});
function endPointer(e){
  pointers.delete(e.pointerId);
  if(pointers.size < 2) pinchDist = 0;
  if(pointers.size === 0){ last = null; viewport.classList.remove("dragging"); }
}
viewport.addEventListener("pointerup", endPointer);
viewport.addEventListener("pointercancel", endPointer);

viewport.addEventListener("wheel", e=>{
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.12 : 1/1.12);
}, {passive:false});

let lastTap = 0;
viewport.addEventListener("pointerup", e=>{
  const now = performance.now();
  if(now - lastTap < 320 && !moved){ zoomAt(e.clientX, e.clientY, 1.5); }
  lastTap = now;
});

/* ---- build POI markers ---- */
POIS.forEach((p, i)=>{
  const b = document.createElement("button");
  b.className = "poi bounce" + (p.here ? " here" : "");
  b.style.left = p.x+"px"; b.style.top = p.y+"px";
  b.style.animationDelay = (i*0.2)+"s";
  b.innerHTML = `<span class="pin"><span>${p.icon}</span></span><span class="lbl">${p.title}</span>`;
  b.addEventListener("click", ev=>{ if(moved) return; openPanel(p); });
  world.appendChild(b);
});

/* ---- info panel ---- */
const panel = document.getElementById("panel");
function openPanel(p){
  document.getElementById("pImg").innerHTML = p.photo ? `<img src="${p.photo}" alt="${p.title}">` : plate(p);
  document.getElementById("pTitle").textContent = p.title;
  const g = document.getElementById("pGaelic");
  g.textContent = p.gaelic ? "Gaelic: " + p.gaelic : "";
  g.style.display = p.gaelic ? "block" : "none";
  document.getElementById("pDesc").textContent = p.desc;
  document.getElementById("pFact").innerHTML = "<b>Did you know?</b> " + p.fact;
  panel.classList.add("open");
  resetIdle();
}
function closePanel(){ panel.classList.remove("open"); }
document.getElementById("pClose").onclick = ()=>{ closePanel(); resetIdle(); };

/* ---- kiosk idle reset ---- */
const IDLE_MS = 90000;
let idleTimer=null;
function resetIdle(){
  clearTimeout(idleTimer);
  idleTimer = setTimeout(()=>{ closePanel(); fit(); }, IDLE_MS);
}
["pointerdown","keydown"].forEach(ev=>document.addEventListener(ev, resetIdle, {passive:true}));

/* ---- boot ---- */
window.addEventListener("resize", ()=>{ clamp(); apply(); });
fit();
resetIdle();
</script>
</body>
</html>
