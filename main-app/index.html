<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Heritage Centre" />
<meta name="theme-color" content="#0b232b" />
<link rel="apple-touch-icon" href="../icon-180.png" />
<link rel="icon" type="image/png" href="../icon-180.png" />
<title>Heritage Centre — Interactive Station</title>
<style>
/* ============================================================
   Heritage Centre — Main Interactive App
   Celtic / Hebridean styling to match the Isle of Barra map.
   Self-contained, offline-first kiosk app (no external assets).
   ============================================================ */

:root{
  /* Hebridean / Celtic palette (shared with the map app) */
  --sea1:#2c6470; --sea2:#0b232b; --sea-sky:#8fcad6;
  --land1:#88a564; --land2:#566f3f; --moss:#4f6b35;
  --sand:#dccba0; --beach:#e6dcc0;
  --parch:#f0e6cd; --parch2:#e2cfa3;
  --ink:#2b2317; --ink-soft:#5b513c;
  --bronze:#a9762a; --bronze-lt:#e0bd6f; --bronze-dk:#7c531a;
  --celtic-red:#8c2f2a; --celtic-green:#3f6b39;
  --shadow:rgba(20,12,0,.35);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  margin:0;padding:0;height:100%;width:100%;overflow:hidden;
  font-family:Georgia,"Iowan Old Style","Palatino Linotype",Palatino,"Times New Roman",serif;
  color:var(--ink);background:var(--sea2);
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
button{font-family:inherit;cursor:pointer;border:none;}

/* ---------- Screen system ---------- */
.screen{position:fixed;inset:0;display:none;}
.screen.active{display:block;}

/* ---------- Shared top bar ---------- */
.topbar{
  position:absolute;top:0;left:0;right:0;height:66px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
  background:linear-gradient(180deg,rgba(11,35,43,.55),rgba(11,35,43,0));
}
.home-btn{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(180deg,var(--parch),var(--parch2));color:var(--ink);
  font-size:20px;font-weight:700;letter-spacing:.5px;
  padding:11px 22px;border-radius:30px;border:2.5px solid var(--bronze);
  box-shadow:0 4px 10px var(--shadow);
}
.home-btn:active{transform:scale(.96);}
.topbar .title{
  color:var(--parch);font-size:24px;font-weight:700;font-variant:small-caps;letter-spacing:2px;
  text-shadow:0 2px 5px rgba(0,0,0,.5);
}
.icon-btn{
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(180deg,var(--parch),var(--parch2));color:var(--bronze-dk);
  font-size:24px;display:flex;align-items:center;justify-content:center;
  border:2.5px solid var(--bronze);box-shadow:0 4px 10px var(--shadow);
}
.icon-btn:active{transform:scale(.94);}

/* reusable triquetra emblem holder */
.knot{color:var(--bronze);}

/* ============================================================
   HOME SCREEN
   ============================================================ */
#home{background:radial-gradient(135% 110% at 50% 0%, #34788a, var(--sea2));}
.home-wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.home-crest{display:flex;align-items:center;gap:20px;margin-bottom:4px;}
.home-crest .knot{width:54px;height:54px;flex:none;color:var(--bronze-lt);}
.home-title{
  color:var(--parch);text-align:center;margin:0;
  font-size:clamp(32px,5.4vw,58px);font-weight:700;font-variant:small-caps;
  letter-spacing:3px;text-shadow:0 3px 8px rgba(0,0,0,.5);
}
.home-sub{
  color:var(--bronze-lt);text-align:center;margin:6px 0 18px;
  font-size:clamp(17px,2.6vw,26px);font-style:italic;letter-spacing:1px;
}
.flag-banner{display:flex;align-items:center;gap:14px;margin:0 0 36px;
  background:linear-gradient(180deg,var(--parch),var(--parch2));border:2px solid var(--bronze);
  border-radius:12px;padding:8px 20px;box-shadow:0 6px 14px var(--shadow);}
.barra-flag{width:66px;height:40px;display:block;border:1px solid rgba(43,35,23,.4);
  border-radius:3px;box-shadow:0 2px 5px rgba(0,0,0,.3);}
.flag-banner span{font-style:italic;color:var(--ink-soft);font-size:clamp(15px,2vw,19px);}
.card-row{display:flex;gap:40px;flex-wrap:wrap;justify-content:center;}
.menu-card{
  position:relative;width:min(40vw,360px);min-width:260px;
  background:linear-gradient(180deg,var(--parch),var(--parch2));border-radius:18px;
  padding:28px 26px 32px;text-align:center;
  border:3px solid var(--bronze);outline:2px solid var(--parch);outline-offset:-7px;
  box-shadow:0 12px 28px var(--shadow);transition:transform .12s ease;
}
.menu-card:active{transform:translateY(4px) scale(.98);}
.menu-card .emoji{font-size:92px;line-height:1;display:block;margin-bottom:8px;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.25));}
.menu-card h2{margin:0 0 6px;font-size:30px;font-variant:small-caps;letter-spacing:1.5px;color:var(--ink);}
.menu-card .gd{display:block;font-size:18px;font-style:italic;color:var(--celtic-red);margin-bottom:8px;}
.menu-card p{margin:0;font-size:18px;color:var(--ink-soft);}

.wave-deco{position:absolute;bottom:0;left:0;width:100%;height:90px;z-index:1;}

/* idle attractor pulse */
@keyframes attract{0%,100%{box-shadow:0 12px 28px var(--shadow);}50%{box-shadow:0 12px 36px rgba(224,189,111,.7);}}
.menu-card.pulse{animation:attract 2.6s ease-in-out infinite;}

/* ============================================================
   FISHING GAME (cooler Hebridean sea)
   ============================================================ */
/* moody Hebridean Atlantic — overcast, steely, no holiday sun */
#game{background:linear-gradient(180deg,#c2cace 0%, #a7b3b6 20%, #87a0a1 38%, #5c7a7c 56%, #3a5a5e 76%, #284449 100%);}
.game-stage{position:absolute;inset:0;overflow:hidden;}

.sky-scene{position:absolute;top:0;left:0;width:100%;height:50%;z-index:0;pointer-events:none;}
.b-emoji svg,.boat-btn svg{display:block;}

.sea-region{position:absolute;left:0;right:0;top:42%;bottom:0;
  background:linear-gradient(180deg, rgba(58,90,94,.28), rgba(16,34,38,.62));}

/* Hebridean wildlife & kelp */
.seal{position:absolute;top:38.5%;left:75%;width:92px;height:78px;z-index:1;pointer-events:none;
  animation:bob2 5s ease-in-out infinite;}
@keyframes bob2{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.kelp{position:absolute;bottom:14%;z-index:1;pointer-events:none;transform-origin:bottom center;
  opacity:.85;animation:sway 6s ease-in-out infinite;}
.kelp.r{right:3%;animation-duration:7.5s;animation-direction:alternate-reverse;}
.kelp.l{left:2%;}
@keyframes sway{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.net{
  position:absolute;left:4%;right:4%;top:46%;bottom:14%;
  border:6px solid rgba(224,189,111,.6);
  border-radius:30px 30px 60px 60px;
  background:
    repeating-linear-gradient(45deg,rgba(240,230,205,.14) 0 2px,transparent 2px 18px),
    repeating-linear-gradient(-45deg,rgba(240,230,205,.14) 0 2px,transparent 2px 18px);
  box-shadow:inset 0 0 40px rgba(0,0,0,.28);
}
.net-label{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,var(--parch),var(--parch2));color:var(--ink);font-weight:700;
  padding:6px 20px;border-radius:24px;font-size:18px;border:2px solid var(--bronze);
  box-shadow:0 3px 6px var(--shadow);white-space:nowrap;}

.fish{position:absolute;width:84px;height:54px;display:flex;align-items:center;justify-content:center;
  transition:transform .12s ease;will-change:left,top,transform;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.32));}
.fish:active{transform:scale(.85);}
.fish svg{width:100%;height:100%;pointer-events:none;}

.hud{position:absolute;left:0;right:0;bottom:0;height:14%;min-height:86px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 calc(22px + env(safe-area-inset-right)) 0 calc(22px + env(safe-area-inset-left));
  z-index:20;}
.basket{position:relative;display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(180deg,var(--parch),var(--parch2));border-radius:16px;padding:8px 18px;
  border:2.5px solid var(--bronze);box-shadow:0 6px 14px var(--shadow);min-width:150px;}
.basket .b-emoji{font-size:44px;line-height:1;}
.basket .b-count{font-size:22px;font-weight:800;color:var(--bronze-dk);}
.basket.flash{animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.18);}100%{transform:scale(1);}}

.progress-track{flex:1;margin:0 22px;height:30px;border-radius:30px;
  background:rgba(240,230,205,.45);overflow:hidden;border:3px solid rgba(224,189,111,.7);}
.progress-fill{height:100%;width:0%;border-radius:30px;
  background:linear-gradient(90deg,var(--celtic-green),#6fa15a);transition:width .3s ease;}

.boat-btn{display:flex;align-items:center;gap:10px;
  background:linear-gradient(180deg,var(--parch),var(--parch2));color:var(--bronze-dk);
  font-size:22px;font-weight:800;padding:14px 26px;border-radius:40px;border:2.5px solid var(--bronze);
  box-shadow:0 6px 14px var(--shadow);opacity:.45;pointer-events:none;
  transition:opacity .2s,transform .12s;}
.boat-btn.ready{opacity:1;pointer-events:auto;
  background:linear-gradient(180deg,var(--bronze-lt),var(--bronze));color:#fff;
  animation:bob 1s ease-in-out infinite;}
.boat-btn.ready:active{transform:scale(.95);}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

.score-pill{position:absolute;top:80px;left:22px;z-index:30;
  background:linear-gradient(180deg,var(--parch),var(--parch2));border-radius:30px;padding:10px 22px;
  font-size:22px;font-weight:800;color:var(--bronze-dk);border:2.5px solid var(--bronze);
  box-shadow:0 4px 10px var(--shadow);display:flex;align-items:center;gap:8px;}

.celebrate{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(11,35,43,.6);backdrop-filter:blur(2px);}
.celebrate.show{display:flex;}
.celebrate-card{background:linear-gradient(180deg,var(--parch),var(--parch2));border-radius:22px;
  padding:32px 44px;text-align:center;border:3px solid var(--bronze);outline:2px solid var(--parch);outline-offset:-8px;
  box-shadow:0 16px 40px rgba(0,0,0,.45);animation:pop .4s ease;max-width:80vw;}
.celebrate-card .big{font-size:88px;line-height:1;}
.celebrate-card h2{font-size:38px;margin:6px 0 4px;font-variant:small-caps;letter-spacing:1px;color:var(--celtic-green);}
.celebrate-card p{font-size:21px;margin:0 0 20px;color:var(--ink-soft);}
.celebrate-card .again{background:linear-gradient(180deg,var(--bronze-lt),var(--bronze));color:#fff;
  font-size:25px;font-weight:800;padding:15px 38px;border-radius:40px;border:2px solid var(--bronze-dk);
  box-shadow:0 6px 14px var(--shadow);}
.celebrate-card .again:active{transform:scale(.96);}

.confetti{position:absolute;top:-20px;width:14px;height:14px;border-radius:3px;z-index:55;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9;}}

.fact-bubble{position:absolute;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(180deg,var(--parch),var(--parch2));border-radius:18px;padding:12px 24px;max-width:70vw;
  font-size:19px;color:var(--ink);border:2px solid var(--bronze);box-shadow:0 6px 16px var(--shadow);
  opacity:0;transition:opacity .35s,transform .35s;z-index:40;text-align:center;}
.fact-bubble.show{opacity:1;transform:translateX(-50%) translateY(0);}
.fact-bubble b{color:var(--celtic-red);}

/* ============================================================
   GALLERY
   ============================================================ */
#gallery{background:radial-gradient(135% 120% at 50% 0%, #2f6b78, var(--sea2));}
.gallery-scroll{position:absolute;inset:66px 0 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 24px 40px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:24px;max-width:1400px;margin:0 auto;}
.exhibit{background:linear-gradient(180deg,var(--parch),var(--parch2));border-radius:12px;overflow:hidden;
  border:3px solid var(--bronze);box-shadow:0 8px 20px rgba(0,0,0,.35);transition:transform .12s;}
.exhibit:active{transform:scale(.97);}
.exhibit .thumb{width:100%;height:170px;display:block;background:#cfe3ef;border-bottom:3px solid var(--bronze);}
.exhibit .cap{padding:12px 15px 14px;}
.exhibit .cap h3{margin:0 0 4px;font-size:20px;font-variant:small-caps;letter-spacing:.6px;color:var(--ink);}
.exhibit .cap p{margin:0;font-size:15px;color:var(--ink-soft);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.lightbox{position:absolute;inset:0;z-index:70;display:none;background:rgba(8,22,28,.94);}
.lightbox.show{display:flex;flex-direction:column;}
.lb-top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.lb-close{background:linear-gradient(180deg,var(--parch),var(--parch2));border-radius:50%;width:54px;height:54px;
  font-size:26px;color:var(--bronze-dk);border:2.5px solid var(--bronze);box-shadow:0 4px 10px var(--shadow);}
.lb-body{flex:1;display:flex;align-items:center;justify-content:center;padding:0 18px;min-height:0;}
.lb-body svg,.lb-body img{max-height:70vh;max-width:92vw;border-radius:10px;border:4px solid var(--bronze);
  box-shadow:0 10px 30px rgba(0,0,0,.5);background:#cfe3ef;}
.lb-caption{background:linear-gradient(180deg,rgba(240,230,205,.96),rgba(226,207,163,.96));
  color:var(--ink);padding:18px 26px 28px;text-align:center;border-top:3px solid var(--bronze);}
.lb-caption h2{margin:0 0 6px;font-size:30px;font-variant:small-caps;letter-spacing:1px;color:var(--ink);}
.lb-caption p{margin:0 auto;font-size:19px;max-width:900px;line-height:1.45;color:var(--ink-soft);}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:62px;height:96px;
  background:linear-gradient(180deg,var(--parch),var(--parch2));color:var(--bronze-dk);
  font-size:40px;display:flex;align-items:center;justify-content:center;border:2.5px solid var(--bronze);
  box-shadow:0 4px 12px var(--shadow);}
.lb-nav.prev{left:10px;border-radius:0 14px 14px 0;}
.lb-nav.next{right:10px;border-radius:14px 0 0 14px;}
.lb-nav:active{transform:translateY(-50%) scale(.92);}

/* ---------- woven knot border frame (home screen only) ---------- */
#frame{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;display:none;}
body.screen-home #frame{display:block;}
</style>
</head>
<body>

<!-- reusable Celtic emblem -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="triq" viewBox="-16 -16 32 32">
    <g fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
      <circle cx="0" cy="-6" r="7"/><circle cx="5.2" cy="3" r="7"/><circle cx="-5.2" cy="3" r="7"/>
      <circle cx="0" cy="0" r="13.5" stroke-width="1.6"/>
    </g>
  </symbol>
</defs></svg>

<!-- =================== HOME =================== -->
<section id="home" class="screen active">
  <div class="home-wrap">
    <div class="home-crest">
      <svg class="knot"><use href="#triq"/></svg>
      <h1 class="home-title">Heritage Centre</h1>
      <svg class="knot"><use href="#triq"/></svg>
    </div>
    <p class="home-sub">Fàilte · Welcome — tap a station to begin</p>
    <div class="flag-banner">
      <svg class="barra-flag" viewBox="0 0 150 90" aria-label="Flag of the Isle of Barra">
        <rect width="150" height="90" fill="#00843D"/>
        <rect x="0" y="38.5" width="150" height="13" fill="#fff"/>
        <rect x="47.5" y="0" width="13" height="90" fill="#fff"/>
      </svg>
      <span>Bratach Bharraigh · Flag of the Isle of Barra</span>
    </div>
    <div class="card-row">
      <button class="menu-card pulse" data-go="game">
        <span class="emoji">🎣</span>
        <h2>Herring Game</h2>
        <span class="gd">Geama an Sgadain</span>
        <p>Catch the silver herring and fill your creel!</p>
      </button>
      <button class="menu-card pulse" data-go="gallery">
        <span class="emoji">🖼️</span>
        <h2>Exhibit Gallery</h2>
        <span class="gd">Gailearaidh</span>
        <p>Explore pictures from our collection</p>
      </button>
    </div>
  </div>
  <svg class="wave-deco" viewBox="0 0 1440 90" preserveAspectRatio="none">
    <path fill="#0b232b" d="M0,40 C240,90 480,0 720,40 C960,80 1200,10 1440,45 L1440,90 L0,90 Z"/>
    <path fill="#a9762a" opacity="0.5" d="M0,52 C240,96 480,14 720,52 C960,90 1200,24 1440,56 L1440,62 C1200,30 960,96 720,58 C480,20 240,102 0,58 Z"/>
  </svg>
</section>

<!-- =================== FISHING GAME =================== -->
<section id="game" class="screen">
  <div class="topbar">
    <button class="home-btn" data-go="home">🏠 Home</button>
    <span class="title">Catch the Herring!</span>
    <button class="icon-btn" id="soundBtn" aria-label="Sound on/off">🔊</button>
  </div>
  <div class="game-stage">
    <svg class="sky-scene" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
      <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#eef1ee" stop-opacity="0.8"/>
          <stop offset="1" stop-color="#eef1ee" stop-opacity="0"/>
        </radialGradient>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6"/></filter>
        <filter id="haze" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur stdDeviation="3"/></filter>
      </defs>

      <!-- a silvery break of light through the cloud (no warm sun) -->
      <ellipse cx="360" cy="120" rx="250" ry="120" fill="url(#glow)"/>

      <!-- distant misty Hebridean islands -->
      <g filter="url(#haze)">
        <path d="M0,316 Q150,300 320,310 Q520,298 720,308 Q900,300 1200,312 L1200,360 L0,360 Z" fill="#9fb2b8" opacity="0.55"/>
        <path d="M0,338 Q220,322 430,332 Q650,322 860,330 Q1020,322 1200,334 L1200,372 L0,372 Z" fill="#7d979c" opacity="0.7"/>
      </g>
      <!-- nearer headland with a Heaval-like peak -->
      <path d="M0,372 Q150,356 280,362 Q400,366 470,326 Q540,360 690,352 Q900,344 1200,360 L1200,420 L0,420 Z" fill="#566f63"/>

      <!-- lighthouse on the headland -->
      <g transform="translate(982,330)">
        <path d="M-24,8 Q0,-1 24,8 L24,18 L-24,18 Z" fill="#43544b"/>
        <rect x="-7" y="-30" width="14" height="40" fill="#f2efe8" stroke="#5b6660" stroke-width="1"/>
        <rect x="-7" y="-22" width="14" height="6" fill="#b23b32"/>
        <rect x="-7" y="-8" width="14" height="6" fill="#b23b32"/>
        <rect x="-9" y="-37" width="18" height="8" rx="2" fill="#2b3a36"/>
        <circle cx="0" cy="-33" r="10" fill="#ffe9a8" opacity="0.5"/>
      </g>

      <!-- moody cloud bank -->
      <g filter="url(#soft)">
        <g fill="#cdd5d8"><ellipse cx="200" cy="64" rx="150" ry="42"/><ellipse cx="380" cy="80" rx="180" ry="46"/><ellipse cx="580" cy="60" rx="160" ry="40"/></g>
        <g fill="#a9b4b8"><ellipse cx="900" cy="70" rx="190" ry="50"/><ellipse cx="1090" cy="90" rx="170" ry="48"/><ellipse cx="1010" cy="56" rx="150" ry="40"/></g>
        <g fill="#8b969c"><ellipse cx="975" cy="108" rx="150" ry="32"/></g>
      </g>

      <!-- a rain squall drifting in under the dark cloud -->
      <g stroke="#aebabe" stroke-width="2" opacity="0.3">
        <line x1="900" y1="126" x2="858" y2="316"/><line x1="930" y1="126" x2="888" y2="316"/>
        <line x1="960" y1="126" x2="918" y2="316"/><line x1="990" y1="126" x2="948" y2="316"/>
        <line x1="1020" y1="126" x2="978" y2="316"/><line x1="1050" y1="128" x2="1010" y2="316"/>
      </g>

      <!-- gannets (white, dark wingtips) and gulls -->
      <g fill="none" stroke-linecap="round">
        <g stroke="#f2f2ee" stroke-width="4"><path d="M438,150 q16,-12 32,0"/><path d="M470,150 q16,-12 32,0"/></g>
        <g stroke="#2b2b2b" stroke-width="4"><path d="M438,150 l-4,3"/><path d="M502,150 l4,3"/></g>
        <g stroke="#3a4a50" stroke-width="3" opacity="0.7"><path d="M620,118 q12,-9 24,0 q12,-9 24,0"/><path d="M706,168 q10,-8 20,0 q10,-8 20,0"/></g>
      </g>

<script>
/* ============================================================
   Heritage Centre — Main Interactive App
   Exhibit data + app logic INLINED so this is ONE self-contained
   file (no external .js). This guarantees it runs when opened
   directly on a phone/tablet or from a kiosk browser, with no
   dependency on sibling files loading.

   >>> TO EDIT EXHIBITS <<< change the EXHIBITS array just below.
   To use a real photo, add  photo:"assets/yourfile.jpg"  to an

   ============================================================ */

function exhibitPlate(opts){

        <stop offset="0" stop-color="${sky}"/>
        <stop offset="0.55" stop-color="${sky}"/>

    <rect x="6" y="6" width="388" height="248" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.5" rx="10"/>
  </svg>`;
}

const EXHIBITS = [
  { id:1, motif:"⛵", sky:"#bfe9fb", sea:"#1c7fb0", accent:"#0b3d5c",
    title:"The Fishing Fleet",
    desc:"For generations, small wooden sailing boats set out from our harbour before dawn. Whole families depended on the daily catch of herring, mackerel and cod." },
  { id:2, motif:"🐟", sky:"#cdeafe", sea:"#15749e", accent:"#0b3d5c",
    title:"The Herring Harvest",
    desc:"Silver herring once filled the nets in their thousands. The fish were salted and packed into barrels by hand, then sold at markets far across the country." },
  { id:3, motif:"🪝", sky:"#e7dcc0", sea:"#2a86a8", accent:"#1a4a5e",
    title:"Nets & Creels",
    desc:"Fishers wove and mended their own nets each evening. Woven creels (baskets) were lowered to the seabed to trap crabs and lobsters among the rocks." },
  { id:4, motif:"🏮", sky:"#fde7c4", sea:"#1c6f95", accent:"#0b3d5c",
    title:"The Old Lighthouse",
    desc:"Built on the headland over 150 years ago, the lighthouse guided boats safely home through fog and storm. Its keeper lived beside it all year round." },
  { id:5, motif:"⚓", sky:"#cfe7f5", sea:"#147093", accent:"#0b3d5c",
    title:"The Harbour Wall",
    desc:"The great stone harbour wall was built to shelter the fleet from rough seas. Look closely on a visit and you can still see the iron mooring rings." },
  { id:6, motif:"🦞", sky:"#f3ddc7", sea:"#1f7ea0", accent:"#15495e",
    title:"Lobster Pots",
    desc:"Shellfish were prized for export. These wooden and willow pots, baited with fish, were a familiar sight stacked along the quayside." },
  { id:7, motif:"🧭", sky:"#dcecf7", sea:"#1c7fb0", accent:"#0b3d5c",
    title:"Tools of the Trade",
    desc:"Compass, lantern and oilskins — the everyday equipment that kept sailors on course and protected them from the cold North Sea spray." },
  { id:8, motif:"🛟", sky:"#d7eefb", sea:"#1a7aa5", accent:"#0b3d5c",
    title:"The Lifeboat Crew",
    desc:"Brave volunteers launched the lifeboat in the worst weather to rescue stricken ships. Their courage is remembered across the island to this day." },
  { id:9, motif:"🪵", sky:"#ecdcc0", sea:"#2a86a8", accent:"#1a4a5e",
    title:"Boat Building",
    desc:"Skilled craftsmen shaped each boat by hand from local timber. A single vessel could take many months to build and would serve a family for decades." },
  { id:10, motif:"🏝️", sky:"#bfe9fb", sea:"#1c7fb0", accent:"#0b3d5c",
    title:"Island Life",
    desc:"Beyond fishing, islanders farmed, kept sheep and gathered seaweed. Explore the Interactive Island Map station to discover more places around the coast." }
];
window.EXHIBITS = EXHIBITS;
window.exhibitPlate = exhibitPlate;

/* ---------------------------- App logic ---------------------------- */
(function(){
  "use strict";

  /* ---------- Screen navigation ---------- */
  const screens = document.querySelectorAll(".screen");
  function show(id){
    screens.forEach(s => s.classList.toggle("active", s.id === id));
    document.body.className = "screen-" + id; // drives the home-only knot frame
    if (id === "game") Game.start();
    else Game.stop();
    if (id === "gallery") Gallery.ensure();
    resetIdle();
  }
  // Bind directly to each control AND accept touch — robust on iOS Safari.
  function bindTap(el, fn){
    let handled = false;
    el.addEventListener("touchend", e => {
      if (e.cancelable) e.preventDefault();   // suppress the 300ms ghost click
      handled = true;
      fn(e);
      setTimeout(() => { handled = false; }, 600);
    }, {passive:false});
    el.addEventListener("click", e => { if (!handled) fn(e); });
  }
  document.querySelectorAll("[data-go]").forEach(el =>
    bindTap(el, () => show(el.getAttribute("data-go"))));

  /* ---------- Sound (WebAudio, optional) ---------- */
  const Sound = {
    on:true, ctx:null,
    init(){ if(!this.ctx){ try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } },
    blip(freq, dur, type){
      if(!this.on) return;
      this.init(); if(!this.ctx) return;
      if(this.ctx.state === "suspended"){ try{ this.ctx.resume(); }catch(e){} }
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type=type||"sine"; o.frequency.value=freq;
      g.gain.value=0.0001; o.connect(g); g.connect(this.ctx.destination);
      const t=this.ctx.currentTime;
      g.gain.exponentialRampToValueAtTime(0.18, t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.18));
      o.start(t); o.stop(t+(dur||0.18));
    },
    catch(){ this.blip(660,0.12,"triangle"); setTimeout(()=>this.blip(880,0.12,"triangle"),70); },
    win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.blip(f,0.18,"sine"),i*120)); }
  };
  const soundBtn = document.getElementById("soundBtn");
  bindTap(soundBtn, ()=>{
    Sound.on = !Sound.on;
    soundBtn.textContent = Sound.on ? "🔊" : "🔈";
    if(Sound.on) Sound.blip(700,0.1);
  });

  /* ============================================================
     FISHING GAME
     ============================================================ */
  // Herring backs: steely blue-greens — a uniform silver shoal of "silver darlings"
  const FISH_COLORS = ["#5f7e8c","#5b8378","#6b8a93","#577a86","#638a80","#6e8f99"];
  const CONFETTI_COLORS = ["#a9762a","#e0bd6f","#3f6b39","#8c2f2a","#2c6470","#eef2f4"];
  // Facts about Barra (Eilean Bharraigh)
  const FUN_FACTS = [
    "Did you know? At <b>Barra Airport</b> the planes land right on the beach — the only beach runway with scheduled flights in the world! ✈️",
    "Did you know? Flights to Barra change with the <b>tide</b>, because the sea covers the sandy runway twice a day. 🌊",
    "Did you know? <b>Kisimul Castle</b> sits on a rock in Castlebay Bay — a castle in the sea, home of Clan MacNeil. 🏰",
    "Did you know? <b>Castlebay</b> was once a busy herring port, its bay full of “silver darlings” and fishing boats. 🐟",
    "Did you know? Barra's beaches are made of tiny <b>cockle shells</b> — the great strand is called Tràigh Mhòr, the Big Beach. 🐚",
    "Did you know? <b>Heaval</b> is Barra's highest hill, with a marble statue of Our Lady of the Sea on its slopes. ⛰️",
    "Did you know? The island is named after <b>St Barr</b> (Finbarr), remembered at the old church of Cille Bharra. ⛪",
    "Did you know? <b>Gaelic</b> is still spoken every day on Barra — its island name is Eilean Bharraigh. 🗣️",
    "Did you know? <b>Grey seals</b> and <b>puffins</b> live all around Barra's shores and cliffs. 🦭",
    "Tapadh leat! Your catch goes to the <b>pier at Castlebay</b> to be sold, just like the old fishing days. ⚖️"
  ];
  const PRAISE = ["Sgoinneil! (Great!)","Math thu fhèin!","Glè mhath! (Very good!)","Wonderful catch!","Tapadh leat!","Brilliant!"];

  // Draw items in a shuffled cycle so nothing repeats until the whole set is used.
  function makeCycler(items){
    let order = [], i = 0;
    function shuffle(){
      order = items.map((_,k)=>k);
      for(let j=order.length-1;j>0;j--){ const r=Math.floor(Math.random()*(j+1)); const t=order[j]; order[j]=order[r]; order[r]=t; }
      i = 0;
    }
    shuffle();
    return function(){ if(i>=order.length) shuffle(); return items[order[i++]]; };
  }
  const nextFact = makeCycler(FUN_FACTS);
  const nextPraise = makeCycler(PRAISE);

  const Game = {
    running:false, raf:null,
    fish:[], net:null, stage:null,
    basketCount:0, goal:6, total:0,
    els:{},
    init(){
      this.net = document.getElementById("net");
      this.stage = document.querySelector("#game .game-stage");
      this.els = {
        count:document.getElementById("basketCount"),
        goal:document.getElementById("basketGoal"),
        fill:document.getElementById("progressFill"),
        boat:document.getElementById("boatBtn"),
        basket:document.getElementById("basket"),
        score:document.getElementById("totalScore"),
        fact:document.getElementById("factBubble"),
        cel:document.getElementById("celebrate"),
        celEmoji:document.getElementById("celEmoji"),
        celTitle:document.getElementById("celTitle"),
        celText:document.getElementById("celText"),
        celAgain:document.getElementById("celAgain")
      };
      this.els.goal.textContent = this.goal;
      bindTap(this.els.boat, ()=>this.toPier());
      bindTap(this.els.celAgain, ()=>{ this.els.cel.classList.remove("show"); });
    },
    start(){
      if(this.running) return;
      this.running = true;
      this.basketCount = 0;
      this.updateBasket();
      this.clearFish();
      const n = 6;
      for(let i=0;i<n;i++) this.spawnFish();
      setTimeout(()=>{ while(this.running && this.fish.length < 6) {
        const before = this.fish.length; this.spawnFish();
        if(this.fish.length === before) break;
      }}, 250);
      this.loop();
    },
    stop(){
      this.running = false;
      if(this.raf) cancelAnimationFrame(this.raf);
      this.els.cel.classList.remove("show");
    },
    clearFish(){ this.fish.forEach(f=>f.el.remove()); this.fish=[]; },
    netBox(){
      const w = this.net.clientWidth, h = this.net.clientHeight;
      return { w, h, fw:84, fh:54, top:Math.max(34,h*0.12) };
    },
    spawnFish(){
      const box = this.netBox();
      if(box.w < 40) { return; }
      const color = FISH_COLORS[Math.floor(rand()*FISH_COLORS.length)];
      const el = document.createElement("div");
      el.className = "fish";
      const dir = rand() < 0.5 ? 1 : -1;
      el.innerHTML = fishSVG(color, dir);
      const x = box.fw + rand()*(box.w - box.fw*2);
      const y = box.top + rand()*(box.h - box.top - box.fh);
      const f = { el, x, y, vx: dir * (0.4 + rand()*0.7), vy: (rand()-0.5)*0.5, wob: rand()*Math.PI*2, caught:false };
      el.style.left = x+"px"; el.style.top = y+"px";
      // respond to either touch or mouse for the catch
      el.addEventListener("pointerdown", ()=>this.catchFish(f), {passive:true});
      el.addEventListener("click", ()=>this.catchFish(f));
      this.net.appendChild(el);
      this.fish.push(f);
    },
    loop(){
      if(!this.running) return;
      const box = this.netBox();
      for(const f of this.fish){
        if(f.caught) continue;
        f.x += f.vx;
        f.wob += 0.05;
        f.y += f.vy + Math.sin(f.wob)*0.4;
        if(f.x < box.fw*0.2){ f.x = box.fw*0.2; flipFish(f, 1); }
        if(f.x > box.w - box.fw){ f.x = box.w - box.fw; flipFish(f, -1); }
        if(f.y < box.top){ f.y = box.top; f.vy = Math.abs(f.vy); }
        if(f.y > box.h - box.fh){ f.y = box.h - box.fh; f.vy = -Math.abs(f.vy); }
        f.el.style.left = f.x+"px";
        f.el.style.top = f.y+"px";
      }
      this.raf = requestAnimationFrame(()=>this.loop());
    },
    catchFish(f){
      if(f.caught) return;
      f.caught = true;
      resetIdle();
      Sound.catch();
      const fr = f.el.getBoundingClientRect();
      const br = this.els.basket.getBoundingClientRect();
      const clone = f.el;
      clone.style.position = "fixed";
      clone.style.left = fr.left+"px";
      clone.style.top = fr.top+"px";
      clone.style.margin = "0";
      clone.style.transition = "transform .5s cubic-bezier(.5,-0.3,.4,1.2), opacity .5s";
      document.body.appendChild(clone);
      const dx = (br.left + br.width/2) - (fr.left + fr.width/2);
      const dy = (br.top + br.height/2) - (fr.top + fr.height/2);
      requestAnimationFrame(()=>{
        clone.style.transform = `translate(${dx}px,${dy}px) scale(.25)`;
        clone.style.opacity = "0.2";
      });
      let finished = false;
      const done = ()=>{
        if(finished) return;          // run exactly once (transitionend OR fallback)
        finished = true;
        clearTimeout(fallback);
        clone.remove();
        this.fish = this.fish.filter(x=>x!==f);
        this.basketCount++;
        this.updateBasket();
        this.els.basket.classList.remove("flash"); void this.els.basket.offsetWidth;
        this.els.basket.classList.add("flash");
        // the net empties as fish are caught — they do NOT respawn until the
        // whole catch has been taken to the pier
        if(this.fish.length === 0) this.els.boat.classList.add("ready");
      };
      clone.addEventListener("transitionend", done, {once:true});
      const fallback = setTimeout(done, 650);
    },
    updateBasket(){
      this.els.count.textContent = this.basketCount;
      this.els.fill.style.width = Math.min(100,(this.basketCount/this.goal)*100)+"%";
      if(this.basketCount < this.goal) this.els.boat.classList.remove("ready");
    },
    toPier(){
      if(this.basketCount === 0 || this.fish.length > 0) return; // only when the whole net is harvested
      resetIdle();
      Sound.win();
      this.total += this.basketCount;
      this.els.score.textContent = this.total;
      this.basketCount = 0;
      this.updateBasket();
      this.els.boat.classList.remove("ready");
      // refill the net with a fresh shoal for the next catch
      for(let i=0;i<this.goal;i++) this.spawnFish();
      confettiBurst();
      this.els.celEmoji.textContent = ["🎉","🐟","⭐","🎣","🛟"][Math.floor(rand()*5)];
      this.els.celTitle.textContent = nextPraise();
      this.els.celText.innerHTML = nextFact();
      this.els.cel.classList.add("show");
    }
  };

  function fishSVG(back, dir){
    // a silver HERRING (drawn head-left; flip to face RIGHT when swimming right)
    const flip = dir>0 ? 'transform="scale(-1,1)" transform-origin="42 27"' : '';
    return `<svg viewBox="0 0 84 54"><g ${flip}>
      <path d="M58,27 L82,13 L74,27 L82,41 Z" fill="#bcc8cf"/>
      <ellipse cx="36" cy="27" rx="27" ry="13.5" fill="#dde6ea"/>
      <path d="M12,24 Q36,11 60,25 Q36,18 12,24 Z" fill="${back}"/>
      <path d="M13,30 Q36,41 59,30 Q36,35 13,30 Z" fill="#f6fafb" opacity="0.92"/>
      <path d="M33,15 Q39,8 45,16 Z" fill="${back}" opacity="0.85"/>
      <path d="M14,27 Q36,25.5 57,27" stroke="#a9bcc3" stroke-width="1.1" fill="none" opacity="0.7"/>
      <path d="M17,23 Q36,21.5 53,23" stroke="#ffffff" stroke-width="0.9" fill="none" opacity="0.55"/>
      <path d="M18,22 q-3 5 0 10" stroke="#a9bcc3" stroke-width="1.3" fill="none" opacity="0.6"/>
      <circle cx="19" cy="25" r="4.1" fill="#fff"/><circle cx="18.6" cy="25" r="2.1" fill="#15222a"/>
    </g></svg>`;
  }
  function flipFish(f, dir){
    f.vx = Math.abs(f.vx)*dir;
    const svg = f.el.querySelector("g");
    // face right (flip) when moving right (dir>0); face left (default) when moving left
    if(svg){ if(dir>0){ svg.setAttribute("transform","scale(-1,1)"); svg.setAttribute("transform-origin","42 27"); } else { svg.removeAttribute("transform"); } }
  }
  function confettiBurst(){
    const colors = CONFETTI_COLORS;
    const stage = document.querySelector("#game .game-stage");
    for(let i=0;i<40;i++){
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = (10+rand()*80)+"%";
      c.style.background = colors[i%colors.length];
      c.style.animationDuration = (1.4+rand()*1.4)+"s";
      c.style.animationDelay = (rand()*0.3)+"s";
      stage.appendChild(c);
      setTimeout(()=>c.remove(), 3200);
    }
  }
  function rand(){ return Math.random(); }

  /* ============================================================
     GALLERY
     ============================================================ */
  const Gallery = {
    built:false, idx:0,
    ensure(){ if(!this.built){ this.build(); this.built=true; } },
    build(){
      const grid = document.getElementById("galleryGrid");
      grid.innerHTML = "";
      window.EXHIBITS.forEach((ex, i)=>{
        const card = document.createElement("button");
        card.className = "exhibit";
        const thumb = ex.photo
          ? `<img class="thumb" src="${ex.photo}" alt="${ex.title}">`
          : `<div class="thumb">${exhibitPlate(ex)}</div>`;
        card.innerHTML = `${thumb}<div class="cap"><h3>${ex.title}</h3><p>${ex.desc}</p></div>`;
        bindTap(card, ()=>this.open(i));
        grid.appendChild(card);
      });
      bindTap(document.getElementById("lbClose"), ()=>this.close());
      bindTap(document.getElementById("lbPrev"), ()=>this.step(-1));
      bindTap(document.getElementById("lbNext"), ()=>this.step(1));
    },
    open(i){
      this.idx = i; resetIdle();
      const lb = document.getElementById("lightbox");
      this.render();
      lb.classList.add("show");
    },
    render(){
      const ex = window.EXHIBITS[this.idx];
      const body = document.getElementById("lbBody");
      body.innerHTML = ex.photo ? `<img src="${ex.photo}" alt="${ex.title}">` : exhibitPlate(ex);
      document.getElementById("lbTitle").textContent = ex.title;
      document.getElementById("lbDesc").textContent = ex.desc;
    },
    step(d){
      const n = window.EXHIBITS.length;
      this.idx = (this.idx + d + n) % n;
      resetIdle();
      this.render();
    },
    close(){ document.getElementById("lightbox").classList.remove("show"); }
  };

  /* ---------- kiosk idle reset ---------- */
  const IDLE_MS = 90000;
  let idleTimer = null;
  function resetIdle(){
    clearTimeout(idleTimer);
    idleTimer = setTimeout(()=>{ Gallery.close(); show("home"); }, IDLE_MS);
  }
  ["pointerdown","touchstart","keydown"].forEach(ev=>
    document.addEventListener(ev, resetIdle, {passive:true}));

  /* ---------- boot ---------- */
  Game.init();
  const startHash = (location.hash || "").replace("#","");
  if (startHash === "game" || startHash === "gallery") show(startHash);
  else document.body.className = "screen-home";
  resetIdle();
})();
</script>
